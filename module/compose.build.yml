# Build from source (dev mode).
# To use: add ../ancroo-runner/module/compose.build.yml to COMPOSE_FILE in .env

services:
  ancroo-runner:
    image: ghcr.io/ancroo/ancroo-runner:latest
    build:
      context: ../ancroo-runner
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
